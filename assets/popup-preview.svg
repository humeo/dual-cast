<svg xmlns="http://www.w3.org/2000/svg" width="440" height="700" viewBox="0 0 440 700">
  <defs>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="btnTranslate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="btnSummary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
    <filter id="btnShadow1">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(67,56,202,0.3)"/>
    </filter>
    <filter id="btnShadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(124,58,237,0.3)"/>
    </filter>
    <clipPath id="roundedOuter">
      <rect x="20" y="20" width="400" height="660" rx="20"/>
    </clipPath>
  </defs>

  <!-- Outer frame shadow -->
  <rect x="20" y="20" width="400" height="660" rx="20" fill="white" filter="url(#shadow)"/>

  <g clip-path="url(#roundedOuter)">

    <!-- Header -->
    <rect x="20" y="20" width="400" height="80" fill="url(#header)"/>

    <!-- Logo icon -->
    <rect x="40" y="40" width="42" height="42" rx="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <g transform="translate(50, 49)">
      <path d="M3 12s1-1 3-1 4 2 6 2 3-1 3-1V2s-1 1-3 1-4-2-6-2-3 1-3 1z" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="3" y1="18" x2="3" y2="12" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    </g>

    <!-- Title text -->
    <text x="92" y="57" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="17" font-weight="700" fill="white" letter-spacing="-0.4">DualCast</text>
    <text x="92" y="74" font-family="'SF Pro Text', sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Bilingual Reader &amp; AI Summary</text>

    <!-- Settings button -->
    <rect x="340" y="46" width="64" height="30" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="372" y="66" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="12" fill="white" font-weight="500">Settings</text>

    <!-- Tabs bar -->
    <rect x="20" y="100" width="400" height="44" fill="white"/>
    <line x1="20" y1="143" x2="420" y2="143" stroke="#e5e7eb" stroke-width="1"/>

    <!-- Active tab -->
    <text x="130" y="127" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="12.5" fill="#4f46e5" font-weight="600">Translate &amp; Summary</text>
    <line x1="60" y1="141" x2="200" y2="141" stroke="#4f46e5" stroke-width="2.5"/>

    <!-- Inactive tab -->
    <text x="320" y="127" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="12.5" fill="#9ca3af" font-weight="400">History</text>

    <!-- Content area bg -->
    <rect x="20" y="144" width="400" height="536" fill="#f8fafc"/>

    <!-- Action buttons -->
    <!-- Translate button -->
    <rect x="38" y="164" width="180" height="90" rx="14" fill="url(#btnTranslate)" filter="url(#btnShadow1)"/>
    <g transform="translate(108, 193)">
      <circle cx="12" cy="12" r="10" fill="none" stroke="white" stroke-width="2"/>
      <line x1="2" y1="12" x2="22" y2="12" stroke="white" stroke-width="2"/>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" fill="none" stroke="white" stroke-width="2"/>
    </g>
    <text x="128" y="237" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="13" fill="white" font-weight="600">Translate</text>

    <!-- Summary button -->
    <rect x="228" y="164" width="180" height="90" rx="14" fill="url(#btnSummary)" filter="url(#btnShadow2)"/>
    <g transform="translate(298, 193)">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="318" y="237" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="13" fill="white" font-weight="600">AI Summary</text>

    <!-- Toggle button -->
    <rect x="38" y="268" width="370" height="38" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <g transform="translate(155, 280)">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="scale(0.58)"/>
      <circle cx="7" cy="7" r="1.8" fill="none" stroke="#6b7280" stroke-width="1.5"/>
    </g>
    <text x="230" y="292" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="12" fill="#6b7280">Hide Translations</text>

    <!-- Progress card -->
    <rect x="38" y="322" width="370" height="80" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1"/>
    <text x="56" y="348" font-family="'SF Pro Text', sans-serif" font-size="12.5" fill="#3730a3" font-weight="600">Translating...</text>
    <text x="370" y="348" text-anchor="end" font-family="'SF Pro Text', sans-serif" font-size="11" fill="#9ca3af" font-weight="500">18 / 24</text>

    <!-- Progress bar bg -->
    <rect x="56" y="360" width="330" height="6" rx="3" fill="#f1f5f9"/>
    <!-- Progress bar fill -->
    <rect x="56" y="360" width="248" height="6" rx="3" fill="url(#btnTranslate)"/>

    <text x="386" y="382" text-anchor="end" font-family="'SF Pro Text', sans-serif" font-size="10" fill="#9ca3af">75%</text>

    <!-- Summary result card -->
    <rect x="38" y="418" width="370" height="180" rx="12" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>

    <!-- AI Summary label -->
    <g transform="translate(56, 438)">
      <polygon points="7 1 9 5.2 14 5.8 10.5 9 11.5 13.5 7 11 2.5 13.5 3.5 9 0 5.8 5 5.2 7 1" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="78" y="450" font-family="'SF Pro Text', sans-serif" font-size="11" fill="#7c3aed" font-weight="700" letter-spacing="0.8">AI SUMMARY</text>

    <!-- Summary text lines -->
    <rect x="56" y="466" width="320" height="8" rx="4" fill="rgba(124,58,237,0.12)"/>
    <rect x="56" y="482" width="280" height="8" rx="4" fill="rgba(124,58,237,0.08)"/>
    <rect x="56" y="498" width="340" height="8" rx="4" fill="rgba(124,58,237,0.08)"/>
    <rect x="56" y="514" width="200" height="8" rx="4" fill="rgba(124,58,237,0.08)"/>
    <rect x="56" y="538" width="300" height="8" rx="4" fill="rgba(124,58,237,0.06)"/>
    <rect x="56" y="554" width="260" height="8" rx="4" fill="rgba(124,58,237,0.06)"/>
    <rect x="56" y="570" width="180" height="8" rx="4" fill="rgba(124,58,237,0.06)"/>

  </g>
</svg>
