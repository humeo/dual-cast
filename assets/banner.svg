<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="0"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="80" r="180" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1050" cy="300" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="150" cy="350" r="100" fill="rgba(255,255,255,0.03)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="white" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Logo icon -->
  <g transform="translate(120, 130)">
    <rect x="0" y="0" width="72" height="72" rx="18" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <g transform="translate(16, 16)">
      <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="4" y1="22" x2="4" y2="15" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Signal waves -->
      <path d="M28 8a8 8 0 0 1 0 12" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
      <path d="M32 4a14 14 0 0 1 0 20" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Title -->
  <text x="220" y="162" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-2">DualCast</text>

  <!-- Subtitle -->
  <text x="220" y="198" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="rgba(255,255,255,0.8)" font-weight="400" letter-spacing="0.5">Bilingual Reader &amp; AI Summary</text>

  <!-- Feature pills -->
  <g transform="translate(220, 230)">
    <rect x="0" y="0" width="160" height="36" rx="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="80" y="23" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="13" fill="rgba(255,255,255,0.9)" font-weight="500">Webpage Translation</text>

    <rect x="175" y="0" width="130" height="36" rx="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="240" y="23" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="13" fill="rgba(255,255,255,0.9)" font-weight="500">AI Summarize</text>

    <rect x="320" y="0" width="150" height="36" rx="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <text x="395" y="23" text-anchor="middle" font-family="'SF Pro Text', sans-serif" font-size="13" fill="rgba(255,255,255,0.9)" font-weight="500">15+ Languages</text>
  </g>

  <!-- Right side — mock bilingual text -->
  <g transform="translate(720, 90)">
    <rect x="0" y="0" width="400" height="220" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <!-- Original text lines -->
    <rect x="24" y="24" width="220" height="10" rx="5" fill="rgba(255,255,255,0.25)"/>
    <rect x="24" y="42" width="180" height="10" rx="5" fill="rgba(255,255,255,0.15)"/>
    <rect x="24" y="60" width="260" height="10" rx="5" fill="rgba(255,255,255,0.15)"/>

    <!-- Divider -->
    <line x1="24" y1="85" x2="376" y2="85" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Translated text lines (accent color) -->
    <rect x="24" y="100" width="200" height="10" rx="5" fill="url(#accent)" opacity="0.6"/>
    <rect x="24" y="118" width="160" height="10" rx="5" fill="url(#accent)" opacity="0.4"/>
    <rect x="24" y="136" width="240" height="10" rx="5" fill="url(#accent)" opacity="0.4"/>

    <!-- Label -->
    <rect x="24" y="168" width="80" height="24" rx="12" fill="rgba(167,139,250,0.25)"/>
    <text x="64" y="184" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" font-weight="600">TRANSLATED</text>

    <rect x="114" y="168" width="70" height="24" rx="12" fill="rgba(255,255,255,0.1)"/>
    <text x="149" y="184" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" font-weight="500">ORIGINAL</text>
  </g>

  <!-- Bottom tagline -->
  <text x="120" y="350" font-family="'SF Pro Text', sans-serif" font-size="14" fill="rgba(255,255,255,0.45)" font-weight="400">Chrome Extension · DeepL &amp; OpenAI · Open Source</text>
</svg>
